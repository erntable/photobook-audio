<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>攝影集語音導覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-color: #3b3a36;
            --accent-color: #d97736;
            --border-color: #dcd8ce;
            --player-icon-color: #3b3a36;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
        }

       body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            min-height: 100vh;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 5px;
            margin-bottom: 8px;
            color: var(--text-color);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 3px;
            color: #85827d;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            border: none;
            border-bottom: 1px solid var(--border-color);
            background: transparent;
            text-align: center;
            outline: none;
            letter-spacing: 2px;
            transition: border-color 0.3s;
            color: var(--text-color);
        }

        input[type="number"]:focus {
            border-bottom: 1px solid var(--accent-color);
        }

        /* 點擊輸入框時，隱藏「請輸入編號」文字，只留下閃爍的游標 */
        input[type="number"]:focus::placeholder {
            color: transparent;
            transition: color 0.3s;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

       .story-card {
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s ease;
            display: none;
            text-align: left;
        }
        
        .story-card.active {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .photo-frame {
            width: 100%;
            margin-bottom: 25px;
            background-color: #2c2a29;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-radius: 2px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .photo-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .photo-desc {
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.8;
            color: #5c5a56;
            text-align: justify;
            margin-bottom: 30px;
        }

        .custom-player {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .player-main-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-pause-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            color: var(--player-icon-color);
        }

        .play-pause-btn svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* --- 修改後的進度條 --- */
        .progress-bar {
            flex-grow: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            /* 透過 CSS 變數 `--progress` 來決定填滿的比例，左邊是深色，右邊是淺色 */
            background: linear-gradient(to right, var(--text-color) var(--progress, 0%), var(--border-color) var(--progress, 0%));
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text-color);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .progress-bar::-webkit-slider-thumb:active {
            transform: scale(1.3);
        }

        .time-display {
            font-size: 0.85rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            min-width: 45px;
            text-align: right;
        }

        .player-sub-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 0.8rem;
            color: #85827d;
        }

        .sub-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #85827d;
            font-size: 0.8rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .sub-btn:hover {
            color: var(--text-color);
        }

        .sub-btn.active {
            color: var(--text-color);
            font-weight: 700;
        }

        .divider {
            color: var(--border-color);
        }

        .error-msg {
            color: #c96558;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>還沒想好 之後再說</h1>
        <div class="subtitle">輸入照片編號，聆聽背後的故事</div>

        <div class="input-group">
            <input type="number" id="photoNumber" placeholder="— 請輸入編號 —" inputmode="numeric">
            <div id="errorMsg" class="error-msg">未找到該編號的照片</div>
        </div>

        <div id="storyCard" class="story-card">
            <div class="photo-frame">
                <img id="photoImage" src="" alt="攝影作品">
            </div>
            
            <div class="photo-title" id="photoTitle"></div>
            <div class="photo-desc" id="photoDesc"></div>
            
            <div class="custom-player" id="customPlayer">
                <div class="player-main-row">
                    <button class="play-pause-btn" id="playPauseBtn">
                        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="iconPause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <!-- 進度條 HTML 維持不變 -->
                    <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100">
                    <div class="time-display" id="timeDisplay">00:00</div>
                </div>
                
                <div class="player-sub-row">
                    <button class="sub-btn" id="rewindBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                        10
                    </button>
                    <button class="sub-btn" id="forwardBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4z"/></svg>
                        10
                    </button>
                    <span class="divider">|</span>
                    <button class="sub-btn active" id="speed1Btn">x 1</button>
                    <button class="sub-btn" id="speed15Btn">x 1.5</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const photoStories = {
            "1": {
                title: "01. 十八歲的夏天",
                text: "這張照片記錄了前十八年的時光切片。當時我帶著裝滿 Kodak Gold 200 的底片機，試圖捕捉那些即將流逝的光影與空氣感。",
                audio: "audio/01.mp3",
                image: "images/01.jpg"
            },
            "2": {
                title: "02. 暮色海岸",
                text: "使用 Velvia 50 正片拍攝的黃昏。海浪拍打在岩石上，呈現出底片特有的高飽和與神祕藍調，是數位轉譯難以完全復刻的質感。",
                audio: "audio/02.mp3",
                image: "images/02.jpg"
            }
        };

        const inputEl = document.getElementById('photoNumber');
        const cardEl = document.getElementById('storyCard');
        const titleEl = document.getElementById('photoTitle');
        const descEl = document.getElementById('photoDesc');
        const imgEl = document.getElementById('photoImage');
        const errorEl = document.getElementById('errorMsg');
        
        const playPauseBtn = document.getElementById('playPauseBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconPause = document.getElementById('iconPause');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const speed1Btn = document.getElementById('speed1Btn');
        const speed15Btn = document.getElementById('speed15Btn');

        let currentAudio = null; 
        let isPlaying = false;
        let currentPhotoId = null;
        let isDragging = false; 

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function setPlayState(playing) {
            isPlaying = playing;
            if (playing) {
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
            } else {
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
            }
        }

        inputEl.addEventListener('input', (e) => {
            const num = e.target.value.trim();
            
            if (currentAudio) {
                currentAudio.pause();
                setPlayState(false);
            }

            if (num === "") {
                cardEl.classList.remove('active');
                errorEl.style.display = 'none';
                return;
            }

            if (photoStories[num]) {
                currentPhotoId = num;
                
                if (photoStories[num].image) {
                    imgEl.src = photoStories[num].image;
                    imgEl.style.display = 'block';
                } else {
                    imgEl.style.display = 'none';
                }

                titleEl.textContent = photoStories[num].title;
                descEl.textContent = photoStories[num].text;
                
                // 重置進度條數值與顏色比例
                progressBar.value = 0;
                progressBar.style.setProperty('--progress', '0%');
                timeDisplay.textContent = "00:00";
                
                loadNewAudio(photoStories[num].audio);

                cardEl.classList.add('active');
                errorEl.style.display = 'none';
            } else {
                currentPhotoId = null;
                cardEl.classList.remove('active');
                errorEl.style.display = 'block';
            }
        });

        function loadNewAudio(url) {
            currentAudio = new Audio(url);
            
            currentAudio.addEventListener('timeupdate', () => {
                if (!isDragging && !isNaN(currentAudio.duration)) {
                    const progressPercent = (currentAudio.currentTime / currentAudio.duration) * 100;
                    progressBar.value = progressPercent;
                    // 同步更新 CSS 的填滿比例
                    progressBar.style.setProperty('--progress', `${progressPercent}%`);
                    timeDisplay.textContent = formatTime(currentAudio.currentTime);
                }
            });

            currentAudio.addEventListener('ended', () => {
                setPlayState(false);
                currentAudio.currentTime = 0;
                progressBar.value = 0;
                progressBar.style.setProperty('--progress', '0%');
            });

            const currentSpeed = speed15Btn.classList.contains('active') ? 1.5 : 1;
            currentAudio.playbackRate = currentSpeed;
        }

        playPauseBtn.addEventListener('click', () => {
            if (!currentAudio) return;
            
            if (isPlaying) {
                currentAudio.pause();
                setPlayState(false);
            } else {
                currentAudio.play().catch(e => {
                    alert("無法播放音檔，請確認音檔路徑是否正確。");
                });
                setPlayState(true);
            }
        });

        // 當使用者拖曳時，即時更新填滿的顏色與時間
        progressBar.addEventListener('input', () => {
            isDragging = true;
            progressBar.style.setProperty('--progress', `${progressBar.value}%`);
            
            if (currentAudio && !isNaN(currentAudio.duration)) {
                const seekTime = (progressBar.value / 100) * currentAudio.duration;
                timeDisplay.textContent = formatTime(seekTime);
            }
        });

        progressBar.addEventListener('change', () => {
            isDragging = false;
            if (currentAudio && !isNaN(currentAudio.duration)) {
                const seekTime = (progressBar.value / 100) * currentAudio.duration;
                currentAudio.currentTime = seekTime;
            }
        });

        rewindBtn.addEventListener('click', () => {
            if (currentAudio) currentAudio.currentTime = Math.max(0, currentAudio.currentTime - 10);
        });

        forwardBtn.addEventListener('click', () => {
            if (currentAudio && !isNaN(currentAudio.duration)) {
                currentAudio.currentTime = Math.min(currentAudio.duration, currentAudio.currentTime + 10);
            }
        });

        function setSpeed(speed) {
            if (currentAudio) currentAudio.playbackRate = speed;
            if (speed === 1) {
                speed1Btn.classList.add('active');
                speed15Btn.classList.remove('active');
            } else {
                speed1Btn.classList.remove('active');
                speed15Btn.classList.add('active');
            }
        }

        speed1Btn.addEventListener('click', () => setSpeed(1));
        speed15Btn.addEventListener('click', () => setSpeed(1.5));
    </script>
</body>
</html>
