<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>攝影集語音導覽</title>
    <!-- 改為引入 Google Fonts 的「思源黑體 (Noto Sans TC)」 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-color: #3b3a36;
            --accent-color: #d97736;
            --border-color: #dcd8ce;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 全面套用思源黑體，若網路問題載入失敗，則退回蘋果或微軟系統預設的無襯線黑體 */
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            min-height: 100vh;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 500; /* 黑體稍微加粗一點比較好看 */
            letter-spacing: 5px;
            margin-bottom: 8px;
            color: var(--text-color);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 3px;
            color: #85827d;
            margin-bottom: 30px;
            /* 已經刪除這裡干擾的 font-family 設定 */
        }

        .input-group {
            margin-bottom: 25px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            border: none;
            border-bottom: 1px solid var(--border-color);
            background: transparent;
            text-align: center;
            outline: none;
            letter-spacing: 2px;
            transition: border-color 0.3s;
            color: var(--text-color);
        }

        input[type="number"]:focus {
            border-bottom: 1px solid var(--accent-color);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .story-card {
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s ease;
            display: none;
            text-align: left;
        }

        .story-card.active {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .photo-frame {
            width: 100%;
            margin-bottom: 25px;
            background-color: #2c2a29;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-radius: 2px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .photo-title {
            font-size: 1.25rem;
            font-weight: 700; /* 標題用粗體凸顯層次 */
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .photo-desc {
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.8;
            color: #5c5a56;
            text-align: justify;
            margin-bottom: 30px;
        }

        .btn-wrapper {
            text-align: center;
        }

        .audio-btn {
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 12px 35px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            /* 已經刪除這裡干擾的 font-family 設定 */
        }

        .audio-btn:hover, .audio-btn:active {
            background: var(--text-color);
            color: #f4f1ea;
        }

        .audio-btn.playing {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
        }

        .error-msg {
            color: #c96558;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>還沒想好 之後再說</h1>
        <div class="subtitle">輸入照片編號，聆聽背後的故事</div>

        <div class="input-group">
            <input type="number" id="photoNumber" placeholder="— 請輸入編號 —" inputmode="numeric">
            <div id="errorMsg" class="error-msg">未找到該編號的照片</div>
        </div>

        <div id="storyCard" class="story-card">
            <div class="photo-frame">
                <img id="photoImage" src="" alt="攝影作品">
            </div>
            
            <div class="photo-title" id="photoTitle"></div>
            <div class="photo-desc" id="photoDesc"></div>
            
            <div class="btn-wrapper">
                <button class="audio-btn" id="playBtn">
                    <span id="btnIcon">▶</span> <span id="btnText">播放故事</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const photoStories = {
            "1": {
                title: "01. 霧中的山脊",
                text: "這張照片拍攝於清晨的中央山脈。當時氣溫很低，陽光突然穿透了雲層，短暫地照亮了這道山脊。",
                audio: "audio/01.mp3",
                image: "images/01.jpg"
            },
            "2": {
                title: "02. 暮色海岸",
                text: "使用正片拍攝的黃昏。海浪拍打在岩石上，呈現出底片特有的神祕藍調。",
                audio: "audio/02.mp3",
                image: "images/02.jpg"
            }
        };

        const inputEl = document.getElementById('photoNumber');
        const cardEl = document.getElementById('storyCard');
        const titleEl = document.getElementById('photoTitle');
        const descEl = document.getElementById('photoDesc');
        const imgEl = document.getElementById('photoImage');
        const errorEl = document.getElementById('errorMsg');
        const playBtn = document.getElementById('playBtn');
        const btnIcon = document.getElementById('btnIcon');
        const btnText = document.getElementById('btnText');

        let currentAudio = null; 
        let isPlaying = false;
        let currentPhotoId = null;

        inputEl.addEventListener('input', (e) => {
            const num = e.target.value.trim();
            
            if (isPlaying) stopAudio();

            if (num === "") {
                cardEl.classList.remove('active');
                errorEl.style.display = 'none';
                return;
            }

            if (photoStories[num]) {
                currentPhotoId = num;
                
                if (photoStories[num].image) {
                    imgEl.src = photoStories[num].image;
                    imgEl.style.display = 'block';
                } else {
                    imgEl.style.display = 'none';
                }

                titleEl.textContent = photoStories[num].title;
                descEl.textContent = photoStories[num].text;
                cardEl.classList.add('active');
                errorEl.style.display = 'none';
            } else {
                currentPhotoId = null;
                cardEl.classList.remove('active');
                errorEl.style.display = 'block';
            }
        });

        playBtn.addEventListener('click', () => {
            if (!currentPhotoId || !photoStories[currentPhotoId]) return;

            if (isPlaying) {
                stopAudio();
            } else {
                playAudio(photoStories[currentPhotoId].audio);
            }
        });

        function playAudio(audioUrl) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            currentAudio = new Audio(audioUrl);
            currentAudio.play().catch(e => {
                alert("無法播放音檔，請確認 audio 資料夾與 mp3 檔案是否已正確上傳。");
                stopAudio();
            });

            isPlaying = true;
            playBtn.classList.add('playing');
            btnIcon.textContent = "■";
            btnText.textContent = "暫停播放";

            currentAudio.onended = () => {
                stopAudio();
            };
        }

        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
            }
            isPlaying = false;
            playBtn.classList.remove('playing');
            btnIcon.textContent = "▶";
            btnText.textContent = "播放故事";
        }
    </script>
</body>
</html>
